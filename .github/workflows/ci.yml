name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  test:
    name: Test on Elixir (via Nix)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/nix
            /nix/store
          key: ${{ runner.os }}-nix-${{ hashFiles('flake.nix', 'flake.lock') }}
          restore-keys: |
            ${{ runner.os }}-nix-
      - name: Cache Mix dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-
      - name: Install Mix dependencies
        run: nix develop -c mix deps.get
      # Type-check gate: replaces Dialyzer. Leans on the Elixir 1.20
      # set-theoretic (gradual) type checker that runs during `mix compile`,
      # with --warnings-as-errors promoting any type/compile warning to a
      # build failure. --force triggers a full recompile so the checker sees
      # the whole project, not just changed modules.
      - name: Compile project (type-check gate)
        run: nix develop -c mix compile --warnings-as-errors --force
      - name: Run tests
        run: nix develop -c mix test
      - name: Check code formatting
        run: nix develop -c mix format --check-formatted
      - name: Run Credo
        run: nix develop -c mix credo
